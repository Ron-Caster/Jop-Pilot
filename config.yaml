# ──────────────────────────────────────────────────────────────
#  Job Pilot – Configuration
#  Fill in your Naukri.com credentials and desired search params.
# ──────────────────────────────────────────────────────────────

auth:
  email: ""
  password: ""

search:
  keywords:
    - "Software Architect"
  experience: "2"           # years of experience (e.g. "0", "1", "5")
  location: "Bangalore"
  job_age: "1"              # freshness filter: "1" = last 1 day, "" = no filter

browser:
  headless: false           # set true to run without a visible window
  implicit_wait: 10         # seconds to wait for elements
